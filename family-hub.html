<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#4f86c6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a2a3a" media="(prefers-color-scheme: dark)" />
  <title>Family Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4f8;
      --bg2: #ffffff;
      --bg3: #e2eaf2;
      --surface: #ffffff;
      --surface2: #f7fafc;
      --border: #dce6ef;
      --text: #1a2a3a;
      --text2: #4a6070;
      --text3: #8aa0b0;
      --accent: #4f86c6;
      --accent2: #3a6fa8;
      --accent-soft: #e8f0fb;
      --nick: #e67e22;
      --nick-soft: #fef3e7;
      --bron: #8e44ad;
      --bron-soft: #f5eef8;
      --green: #27ae60;
      --green-soft: #eafaf1;
      --red: #e74c3c;
      --red-soft: #fdf0ef;
      --yellow: #f39c12;
      --yellow-soft: #fef9e7;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1923;
        --bg2: #162030;
        --bg3: #1e2d3d;
        --surface: #1e2d3d;
        --surface2: #243447;
        --border: #2a3d52;
        --text: #e8f0f8;
        --text2: #a0b8cc;
        --text3: #5a7a90;
        --accent: #5a96d6;
        --accent2: #4a86c6;
        --accent-soft: #1a2d42;
        --nick-soft: #2a1a0a;
        --bron-soft: #1e1028;
        --green-soft: #0a1e12;
        --red-soft: #1e0a0a;
        --yellow-soft: #1e160a;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── SCREENS ── */
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }

    /* ── WELCOME ── */
    #welcome-screen {
      background: linear-gradient(135deg, #4f86c6 0%, #3a6fa8 100%);
      justify-content: center; align-items: center;
      padding: 40px 32px; gap: 32px;
    }
    .welcome-logo { font-family: 'Nunito', sans-serif; font-size: 36px; font-weight: 800; color: white; text-align: center; }
    .welcome-logo span { display: block; font-size: 16px; font-weight: 600; opacity: 0.8; margin-top: 4px; }
    .welcome-subtitle { color: rgba(255,255,255,0.85); text-align: center; font-size: 16px; }
    .user-cards { display: flex; gap: 16px; width: 100%; max-width: 320px; }
    .user-card {
      flex: 1; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      border-radius: 18px; padding: 24px 16px; text-align: center; cursor: pointer;
      transition: all 0.2s; backdrop-filter: blur(10px);
    }
    .user-card:active { transform: scale(0.96); background: rgba(255,255,255,0.25); }
    .user-avatar { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; font-family: 'Nunito', sans-serif; }
    .user-card.nick .user-avatar { background: var(--nick); color: white; }
    .user-card.bron .user-avatar { background: var(--bron); color: white; }
    .user-card-name { color: white; font-weight: 700; font-size: 17px; font-family: 'Nunito', sans-serif; }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px; flex: 1; }
    .user-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px; cursor: pointer;
      font-weight: 700; font-size: 13px; font-family: 'Nunito', sans-serif;
      transition: opacity 0.15s;
    }
    .user-pill:active { opacity: 0.7; }
    .user-pill.nick { background: var(--nick-soft); color: var(--nick); }
    .user-pill.bron { background: var(--bron-soft); color: var(--bron); }
    .user-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .user-pill.nick .dot { background: var(--nick); }
    .user-pill.bron .dot { background: var(--bron); }

    /* ── NAV ── */
    .bottomnav {
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 10px 4px 8px; cursor: pointer; transition: all 0.15s;
      color: var(--text3); gap: 3px;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; font-family: 'Nunito', sans-serif; }
    .nav-indicator {
      width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
      opacity: 0; transition: opacity 0.15s;
    }
    .nav-item.active .nav-indicator { opacity: 1; }

    /* ── CONTENT ── */
    .content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card-header {
      padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .card-header h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; flex: 1; }
    .card-body { padding: 0; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: var(--radius-sm); border: none;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.15s; outline: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:active { background: var(--accent2); }
    .btn-ghost { background: transparent; color: var(--text2); }
    .btn-danger { background: var(--red-soft); color: var(--red); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 72px; right: 16px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: white; border: none;
      box-shadow: 0 4px 16px rgba(79,134,198,0.4);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 28px; transition: all 0.15s;
      z-index: 100;
    }
    .fab:active { transform: scale(0.93); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: flex-end; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 520px;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 16px; }
    .modal h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; padding: 13px; }

    /* ── FORM ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .field label { font-weight: 700; font-size: 13px; color: var(--text2); letter-spacing: 0.3px; }
    .field input, .field textarea, .field select {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field textarea { resize: none; min-height: 80px; }

    /* ── LIST ITEMS ── */
    .list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:active { background: var(--surface2); }
    .list-item-main { flex: 1; min-width: 0; }
    .list-item-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .list-item.done .list-item-title { text-decoration: line-through; color: var(--text3); }

    /* ── CHECKBOX ── */
    .checkbox {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .checkbox.checked { background: var(--green); border-color: var(--green); }
    .checkbox.checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 800; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700; font-family: 'Nunito', sans-serif;
    }
    .badge.nick { background: var(--nick-soft); color: var(--nick); }
    .badge.bron { background: var(--bron-soft); color: var(--bron); }
    .badge.green { background: var(--green-soft); color: var(--green); }
    .badge.yellow { background: var(--yellow-soft); color: var(--yellow); }
    .badge.red { background: var(--red-soft); color: var(--red); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: all 0.15s;
      background: var(--bg3); color: var(--text2); border: none;
    }
    .tab.active { background: var(--accent); color: white; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 6px;
    }
    .section-header h4 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }

    /* ── CALENDAR ── */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 8px; }
    .cal-day-name { text-align: center; font-size: 11px; font-weight: 700; color: var(--text3); padding: 4px 0; font-family: 'Nunito', sans-serif; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.1s; position: relative; gap: 2px;
    }
    .cal-day:active { background: var(--accent-soft); }
    .cal-day.today { background: var(--accent); color: white; font-weight: 800; }
    .cal-day.has-events::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 3px; }
    .cal-day.today.has-events::after { background: white; }
    .cal-day.other-month { color: var(--text3); }
    .cal-day.selected { background: var(--accent-soft); color: var(--accent); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
    .cal-nav h3 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 17px; }

    /* ── BUDGET ── */
    .budget-summary {
      padding: 16px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .budget-stat { background: var(--bg3); border-radius: var(--radius-sm); padding: 12px 14px; }
    .budget-stat-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .budget-stat-value { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px; }
    .budget-stat-value.green { color: var(--green); }
    .budget-stat-value.red { color: var(--red); }
    .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 24px; color: var(--text3); }
    .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 32px; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SWIPE DELETE ── */
    .swipe-wrap { position: relative; overflow: hidden; }
    .swipe-inner { transition: transform 0.2s; }
    .swipe-delete {
      position: absolute; right: 0; top: 0; bottom: 0;
      background: var(--red); color: white;
      display: flex; align-items: center; justify-content: center;
      padding: 0 20px; font-size: 13px; font-weight: 700;
    }

    /* ── DELETE BTN ── */
    .delete-btn {
      background: none; border: none; color: var(--text3);
      padding: 6px; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .delete-btn:active { background: var(--red-soft); color: var(--red); }

    /* ── MONTH PICKER ── */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .month-nav h4 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; }
    .icon-btn { background: none; border: none; color: var(--text2); padding: 6px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; }
    .icon-btn:active { background: var(--bg3); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg);
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
      opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── BUDGET CATEGORY ROW ── */
    .cat-row { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .cat-row:last-child { border-bottom: none; }
    .cat-row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .cat-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .cat-amounts { font-size: 13px; color: var(--text2); }
    .cat-amounts strong { color: var(--text); }

    /* ── TRANSACTION ROW ── */
    .tx-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .tx-row:last-child { border-bottom: none; }
    .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .tx-main { flex: 1; min-width: 0; }
    .tx-desc { font-weight: 600; font-size: 14px; }
    .tx-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .tx-amount { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; color: var(--red); flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- WELCOME SCREEN -->
  <div class="screen active" id="welcome-screen">
    <div class="welcome-logo">
      🏡 Family Hub
      <span>Who are you?</span>
    </div>
    <p class="welcome-subtitle">Tap your name to get started</p>
    <div class="user-cards">
      <div class="user-card nick" onclick="selectUser('Nick')">
        <div class="user-avatar">N</div>
        <div class="user-card-name">Nick</div>
      </div>
      <div class="user-card bron" onclick="selectUser('Bronwyn')">
        <div class="user-avatar">B</div>
        <div class="user-card-name">Bronwyn</div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="screen" id="main-screen">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">🛒 Shopping</div>
      <div class="user-pill" id="user-pill" onclick="switchUser()">
        <div class="dot"></div>
        <span id="user-pill-name">Nick</span>
      </div>
    </div>

    <!-- SHOPPING TAB -->
    <div id="tab-shopping" class="tab-content" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="tabs" id="shopping-tabs"></div>
      <div class="content" id="shopping-list"></div>
    </div>

    <!-- TASKS TAB -->
    <div id="tab-tasks" class="tab-content" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="tabs" id="task-tabs"></div>
      <div class="content" id="task-list"></div>
    </div>

    <!-- CALENDAR TAB -->
    <div id="tab-calendar" class="tab-content" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div style="background:var(--surface);border-bottom:1px solid var(--border);">
        <div class="cal-nav">
          <button class="icon-btn" onclick="changeMonth(-1)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h3 id="cal-month-label"></h3>
          <button class="icon-btn" onclick="changeMonth(1)">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="content" id="cal-events"></div>
    </div>

    <!-- BUDGET TAB -->
    <div id="tab-budget" class="tab-content" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="month-nav">
        <button class="icon-btn" onclick="changeBudgetMonth(-1)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h4 id="budget-month-label"></h4>
        <button class="icon-btn" onclick="changeBudgetMonth(1)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <div class="content" id="budget-content"></div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottomnav">
      <div class="nav-item active" id="nav-shopping" onclick="switchTab('shopping')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Shop</span>
        <div class="nav-indicator"></div>
      </div>
      <div class="nav-item" id="nav-tasks" onclick="switchTab('tasks')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Tasks</span>
        <div class="nav-indicator"></div>
      </div>
      <div class="nav-item" id="nav-calendar" onclick="switchTab('calendar')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
        <div class="nav-indicator"></div>
      </div>
      <div class="nav-item" id="nav-budget" onclick="switchTab('budget')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <span>Budget</span>
        <div class="nav-indicator"></div>
      </div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()">+</button>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot, doc,
    updateDoc, deleteDoc, query, orderBy, where, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBq3r3_IhnJVwPjM870FmCiQqMBIRj1TYo",
    authDomain: "family-hub-f3264.firebaseapp.com",
    databaseURL: "https://family-hub-f3264-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "family-hub-f3264",
    storageBucket: "family-hub-f3264.firebasestorage.app",
    messagingSenderId: "600999943033",
    appId: "1:600999943033:web:f3c88e4f76f0aeb945eda8",
    measurementId: "G-32EK8QG8V7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── STATE ──
  let currentUser = localStorage.getItem('familyHubUser') || null;
  let currentTab = 'shopping';
  let currentShoppingList = 'Weekly Shop';
  let currentTaskCategory = 'All';
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let selectedCalDate = null;
  let budgetYear = new Date().getFullYear();
  let budgetMonth = new Date().getMonth();
  let unsubscribers = [];

  const SHOPPING_LISTS = ['Weekly Shop', 'Top-up', 'Tesco', 'Countdown', 'Other'];
  const TASK_CATS = ['All', 'Inside', 'Outside', 'Car', 'Admin', 'Other'];
  const BUDGET_CATS = [
    { name: 'Food & Groceries', icon: '🛒', color: '#27ae60' },
    { name: 'Bills & Utilities', icon: '🏠', color: '#e74c3c' },
    { name: 'Transport', icon: '🚗', color: '#3498db' },
    { name: 'Fun & Eating Out', icon: '🎉', color: '#9b59b6' },
    { name: 'Clothing', icon: '👕', color: '#e67e22' },
    { name: 'Health', icon: '💊', color: '#1abc9c' },
    { name: 'Kids & Family', icon: '👨‍👩‍👧', color: '#f39c12' },
    { name: 'Other', icon: '📦', color: '#7f8c8d' },
  ];

  // ── HELPERS ──
  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  };

  const userClass = (u) => u === 'Nick' ? 'nick' : 'bron';

  const formatDate = (ts) => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
  };

  const monthLabel = (y, m) => new Date(y, m, 1).toLocaleDateString('en-NZ', { month: 'long', year: 'numeric' });

  // ── USER ──
  window.selectUser = (name) => {
    currentUser = name;
    localStorage.setItem('familyHubUser', name);
    document.getElementById('welcome-screen').classList.remove('active');
    document.getElementById('main-screen').classList.add('active');
    document.getElementById('fab').style.display = 'flex';
    updateUserPill();
    initTab('shopping');
  };

  window.switchUser = () => {
    if (confirm(`Switch to ${currentUser === 'Nick' ? 'Bronwyn' : 'Nick'}?`)) {
      currentUser = currentUser === 'Nick' ? 'Bronwyn' : 'Nick';
      localStorage.setItem('familyHubUser', currentUser);
      updateUserPill();
      showToast(`Switched to ${currentUser}`);
    }
  };

  const updateUserPill = () => {
    const pill = document.getElementById('user-pill');
    const name = document.getElementById('user-pill-name');
    pill.className = `user-pill ${userClass(currentUser)}`;
    name.textContent = currentUser;
  };

  // ── TABS ──
  window.switchTab = (tab) => {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`tab-${tab}`).style.display = 'flex';
    document.getElementById(`nav-${tab}`).classList.add('active');
    currentTab = tab;
    const titles = { shopping: '🛒 Shopping', tasks: '✅ Tasks', calendar: '📅 Calendar', budget: '💰 Budget' };
    document.getElementById('topbar-title').textContent = titles[tab];
    unsubscribers.forEach(u => u());
    unsubscribers = [];
    initTab(tab);
  };

  const initTab = (tab) => {
    if (tab === 'shopping') initShopping();
    else if (tab === 'tasks') initTasks();
    else if (tab === 'calendar') initCalendar();
    else if (tab === 'budget') initBudget();
  };

  // ── MODAL ──
  window.openAddModal = () => {
    if (currentTab === 'shopping') showShoppingModal();
    else if (currentTab === 'tasks') showTaskModal();
    else if (currentTab === 'calendar') showEventModal();
    else if (currentTab === 'budget') showTransactionModal();
  };

  window.closeModal = (e) => {
    if (e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  };

  const openModal = (html) => {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
  };

  const closeModalDirect = () => {
    document.getElementById('modal-overlay').classList.remove('open');
  };

  // ══════════════════════════════════════
  // SHOPPING
  // ══════════════════════════════════════
  const initShopping = () => {
    // render tabs
    const tabsEl = document.getElementById('shopping-tabs');
    tabsEl.innerHTML = SHOPPING_LISTS.map(l =>
      `<button class="tab ${l === currentShoppingList ? 'active' : ''}" onclick="setShoppingList('${l}')">${l}</button>`
    ).join('');
    loadShoppingItems();
  };

  window.setShoppingList = (list) => {
    currentShoppingList = list;
    initShopping();
  };

  const loadShoppingItems = () => {
    const el = document.getElementById('shopping-list');
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const q = query(collection(db, 'shopping'), where('list', '==', currentShoppingList), orderBy('createdAt', 'asc'));
    const unsub = onSnapshot(q, (snap) => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderShoppingItems(items);
    });
    unsubscribers.push(unsub);
  };

  const renderShoppingItems = (items) => {
    const el = document.getElementById('shopping-list');
    const pending = items.filter(i => !i.done);
    const done = items.filter(i => i.done);
    if (items.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🛒</div><p>No items in ${currentShoppingList}.<br>Tap + to add some.</p></div>`;
      return;
    }
    let html = '<div class="card">';
    if (pending.length > 0) {
      html += pending.map(item => shoppingItemHTML(item)).join('');
    }
    if (done.length > 0) {
      html += `<div class="section-header"><h4>✓ Done (${done.length})</h4><button class="btn btn-ghost btn-sm" onclick="clearDone()">Clear all</button></div>`;
      html += done.map(item => shoppingItemHTML(item)).join('');
    }
    html += '</div>';
    el.innerHTML = html;
  };

  const shoppingItemHTML = (item) => `
    <div class="list-item ${item.done ? 'done' : ''}" id="si-${item.id}">
      <div class="checkbox ${item.done ? 'checked' : ''}" onclick="toggleShoppingItem('${item.id}', ${!item.done})"></div>
      <div class="list-item-main">
        <div class="list-item-title">${item.name}${item.qty && item.qty !== '1' ? ` <span style="color:var(--text3);font-size:13px;">×${item.qty}</span>` : ''}</div>
        <div class="list-item-sub"><span class="badge ${userClass(item.addedBy)}">${item.addedBy}</span>${item.note ? ` · ${item.note}` : ''}</div>
      </div>
      <button class="delete-btn" onclick="deleteShoppingItem('${item.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;

  window.toggleShoppingItem = async (id, done) => {
    await updateDoc(doc(db, 'shopping', id), { done });
  };

  window.deleteShoppingItem = async (id) => {
    await deleteDoc(doc(db, 'shopping', id));
    showToast('Item removed');
  };

  window.clearDone = async () => {
    if (!confirm('Remove all ticked items?')) return;
    const q = query(collection(db, 'shopping'), where('list', '==', currentShoppingList), where('done', '==', true));
    const snap = await getDocs(q);
    snap.forEach(d => deleteDoc(d.ref));
    showToast('Cleared ✓');
  };

  window.showShoppingModal = (item = null) => {
    openModal(`
      <div class="modal-handle"></div>
      <h3>${item ? 'Edit Item' : 'Add to ' + currentShoppingList}</h3>
      <div class="field"><label>ITEM NAME</label><input id="s-name" placeholder="e.g. Milk" value="${item?.name || ''}" autocomplete="off"/></div>
      <div class="field"><label>QUANTITY</label><input id="s-qty" placeholder="1" value="${item?.qty || '1'}" type="text"/></div>
      <div class="field"><label>NOTE (optional)</label><input id="s-note" placeholder="e.g. Full fat" value="${item?.note || ''}" autocomplete="off"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="saveShoppingItem('${item?.id || ''}')">${item ? 'Save' : 'Add Item'}</button>
      </div>`);
    setTimeout(() => document.getElementById('s-name').focus(), 100);
  };

  window.saveShoppingItem = async (id) => {
    const name = document.getElementById('s-name').value.trim();
    if (!name) { showToast('Please enter a name'); return; }
    const data = {
      name, qty: document.getElementById('s-qty').value || '1',
      note: document.getElementById('s-note').value.trim(),
      list: currentShoppingList, addedBy: currentUser, done: false,
      createdAt: new Date()
    };
    if (id) await updateDoc(doc(db, 'shopping', id), data);
    else await addDoc(collection(db, 'shopping'), data);
    closeModalDirect();
    showToast(id ? 'Updated!' : `${name} added`);
  };

  // ══════════════════════════════════════
  // TASKS
  // ══════════════════════════════════════
  const initTasks = () => {
    const tabsEl = document.getElementById('task-tabs');
    tabsEl.innerHTML = TASK_CATS.map(c =>
      `<button class="tab ${c === currentTaskCategory ? 'active' : ''}" onclick="setTaskCat('${c}')">${c}</button>`
    ).join('');
    loadTasks();
  };

  window.setTaskCat = (cat) => {
    currentTaskCategory = cat;
    initTasks();
  };

  const loadTasks = () => {
    const el = document.getElementById('task-list');
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    let q;
    if (currentTaskCategory === 'All') {
      q = query(collection(db, 'tasks'), orderBy('createdAt', 'desc'));
    } else {
      q = query(collection(db, 'tasks'), where('category', '==', currentTaskCategory), orderBy('createdAt', 'desc'));
    }
    const unsub = onSnapshot(q, snap => {
      const tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks(tasks);
    });
    unsubscribers.push(unsub);
  };

  const renderTasks = (tasks) => {
    const el = document.getElementById('task-list');
    if (tasks.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>No tasks here.<br>Tap + to add one.</p></div>`;
      return;
    }
    const pending = tasks.filter(t => !t.done);
    const done = tasks.filter(t => t.done);
    let html = '';
    if (pending.length > 0) {
      html += '<div class="card">' + pending.map(t => taskHTML(t)).join('') + '</div>';
    }
    if (done.length > 0) {
      html += `<div class="section-header"><h4>✓ Completed (${done.length})</h4><button class="btn btn-ghost btn-sm" onclick="clearDoneTasks()">Clear all</button></div>`;
      html += '<div class="card">' + done.map(t => taskHTML(t)).join('') + '</div>';
    }
    el.innerHTML = html || `<div class="empty-state"><div class="icon">✅</div><p>All done!</p></div>`;
  };

  const taskHTML = (t) => `
    <div class="list-item ${t.done ? 'done' : ''}">
      <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask('${t.id}', ${!t.done})"></div>
      <div class="list-item-main">
        <div class="list-item-title">${t.title}</div>
        <div class="list-item-sub">
          <span class="badge ${userClass(t.addedBy)}">${t.addedBy}</span>
          ${t.category !== 'Other' ? ` · <span class="badge yellow">${t.category}</span>` : ''}
          ${t.note ? ` · ${t.note}` : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask('${t.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;

  window.toggleTask = async (id, done) => {
    await updateDoc(doc(db, 'tasks', id), { done, completedBy: done ? currentUser : null });
  };

  window.deleteTask = async (id) => {
    await deleteDoc(doc(db, 'tasks', id));
    showToast('Task removed');
  };

  window.clearDoneTasks = async () => {
    if (!confirm('Remove all completed tasks?')) return;
    const q = query(collection(db, 'tasks'), where('done', '==', true));
    const snap = await getDocs(q);
    snap.forEach(d => deleteDoc(d.ref));
    showToast('Cleared ✓');
  };

  window.showTaskModal = () => {
    openModal(`
      <div class="modal-handle"></div>
      <h3>Add Task</h3>
      <div class="field"><label>TASK</label><input id="t-title" placeholder="e.g. Fix back gate" autocomplete="off"/></div>
      <div class="field"><label>CATEGORY</label>
        <select id="t-cat">${TASK_CATS.filter(c => c !== 'All').map(c => `<option>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>NOTE (optional)</label><input id="t-note" placeholder="Any extra details..." autocomplete="off"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTask()">Add Task</button>
      </div>`);
    setTimeout(() => document.getElementById('t-title').focus(), 100);
  };

  window.saveTask = async () => {
    const title = document.getElementById('t-title').value.trim();
    if (!title) { showToast('Please enter a task'); return; }
    await addDoc(collection(db, 'tasks'), {
      title, category: document.getElementById('t-cat').value,
      note: document.getElementById('t-note').value.trim(),
      addedBy: currentUser, done: false, createdAt: new Date()
    });
    closeModalDirect();
    showToast(`Task added`);
  };

  // ══════════════════════════════════════
  // CALENDAR
  // ══════════════════════════════════════
  const initCalendar = () => {
    renderCalGrid();
    loadCalEvents();
  };

  window.changeMonth = (dir) => {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    selectedCalDate = null;
    unsubscribers.forEach(u => u());
    unsubscribers = [];
    initCalendar();
  };

  const renderCalGrid = () => {
    document.getElementById('cal-month-label').textContent = monthLabel(calYear, calMonth);
    const grid = document.getElementById('cal-grid');
    const days = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    let html = days.map(d => `<div class="cal-day-name">${d}</div>`).join('');
    const first = new Date(calYear, calMonth, 1).getDay();
    const last = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date();
    for (let i = 0; i < first; i++) {
      const d = new Date(calYear, calMonth, -first + i + 1).getDate();
      html += `<div class="cal-day other-month">${d}</div>`;
    }
    for (let d = 1; d <= last; d++) {
      const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
      const isSel = selectedCalDate === d;
      html += `<div class="cal-day ${isToday ? 'today' : ''} ${isSel ? 'selected' : ''}" id="calday-${d}" onclick="selectCalDay(${d})">${d}</div>`;
    }
    grid.innerHTML = html;
  };

  window.selectCalDay = (d) => {
    selectedCalDate = d;
    renderCalGrid();
    renderCalEvents(window._calEvents || []);
  };

  const loadCalEvents = () => {
    const start = new Date(calYear, calMonth, 1);
    const end = new Date(calYear, calMonth + 1, 0, 23, 59, 59);
    const q = query(collection(db, 'events'), where('date', '>=', start), where('date', '<=', end), orderBy('date', 'asc'));
    const unsub = onSnapshot(q, snap => {
      const events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      window._calEvents = events;
      // mark days with events
      document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('has-events'));
      events.forEach(e => {
        const d = e.date.toDate ? e.date.toDate().getDate() : new Date(e.date).getDate();
        const el = document.getElementById(`calday-${d}`);
        if (el) el.classList.add('has-events');
      });
      renderCalEvents(events);
    });
    unsubscribers.push(unsub);
  };

  const renderCalEvents = (events) => {
    const el = document.getElementById('cal-events');
    const filtered = selectedCalDate
      ? events.filter(e => { const d = e.date.toDate ? e.date.toDate() : new Date(e.date); return d.getDate() === selectedCalDate; })
      : events;
    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📅</div><p>${selectedCalDate ? 'No events on this day.' : 'No events this month.'}<br>Tap + to add one.</p></div>`;
      return;
    }
    el.innerHTML = '<div class="card">' + filtered.map(e => {
      const d = e.date.toDate ? e.date.toDate() : new Date(e.date);
      const timeStr = e.time || '';
      return `<div class="list-item">
        <div style="width:40px;height:40px;background:var(--accent-soft);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:11px;font-weight:800;color:var(--accent);font-family:'Nunito',sans-serif;">${d.toLocaleDateString('en-NZ',{month:'short'}).toUpperCase()}</span>
          <span style="font-size:17px;font-weight:800;color:var(--accent);font-family:'Nunito',sans-serif;line-height:1;">${d.getDate()}</span>
        </div>
        <div class="list-item-main">
          <div class="list-item-title">${e.title}</div>
          <div class="list-item-sub">
            ${timeStr ? `🕐 ${timeStr} · ` : ''}<span class="badge ${userClass(e.addedBy)}">${e.addedBy}</span>
            ${e.note ? ` · ${e.note}` : ''}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteEvent('${e.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('') + '</div>';
  };

  window.deleteEvent = async (id) => {
    if (confirm('Delete this event?')) {
      await deleteDoc(doc(db, 'events', id));
      showToast('Event deleted');
    }
  };

  window.showEventModal = () => {
    const today = new Date();
    const defaultDate = selectedCalDate
      ? `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(selectedCalDate).padStart(2,'0')}`
      : today.toISOString().slice(0,10);
    openModal(`
      <div class="modal-handle"></div>
      <h3>Add Event</h3>
      <div class="field"><label>EVENT</label><input id="e-title" placeholder="e.g. Dentist appointment" autocomplete="off"/></div>
      <div class="field"><label>DATE</label><input id="e-date" type="date" value="${defaultDate}"/></div>
      <div class="field"><label>TIME (optional)</label><input id="e-time" type="time"/></div>
      <div class="field"><label>NOTE (optional)</label><input id="e-note" placeholder="Any extra details..." autocomplete="off"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="saveEvent()">Add Event</button>
      </div>`);
    setTimeout(() => document.getElementById('e-title').focus(), 100);
  };

  window.saveEvent = async () => {
    const title = document.getElementById('e-title').value.trim();
    const dateVal = document.getElementById('e-date').value;
    if (!title) { showToast('Please enter a title'); return; }
    if (!dateVal) { showToast('Please pick a date'); return; }
    await addDoc(collection(db, 'events'), {
      title, date: new Date(dateVal + 'T12:00:00'),
      time: document.getElementById('e-time').value,
      note: document.getElementById('e-note').value.trim(),
      addedBy: currentUser, createdAt: new Date()
    });
    closeModalDirect();
    showToast('Event added!');
  };

  // ══════════════════════════════════════
  // BUDGET
  // ══════════════════════════════════════
  const initBudget = () => {
    document.getElementById('budget-month-label').textContent = monthLabel(budgetYear, budgetMonth);
    loadBudget();
  };

  window.changeBudgetMonth = (dir) => {
    budgetMonth += dir;
    if (budgetMonth > 11) { budgetMonth = 0; budgetYear++; }
    if (budgetMonth < 0) { budgetMonth = 11; budgetYear--; }
    unsubscribers.forEach(u => u());
    unsubscribers = [];
    initBudget();
  };

  const loadBudget = () => {
    const el = document.getElementById('budget-content');
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    const start = new Date(budgetYear, budgetMonth, 1);
    const end = new Date(budgetYear, budgetMonth + 1, 0, 23, 59, 59);
    const q = query(collection(db, 'transactions'), where('date', '>=', start), where('date', '<=', end), orderBy('date', 'desc'));
    const unsub = onSnapshot(q, snap => {
      const txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderBudget(txs);
    });
    unsubscribers.push(unsub);
  };

  const renderBudget = (txs) => {
    const el = document.getElementById('budget-content');
    const total = txs.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);

    // Group by category
    const bycat = {};
    BUDGET_CATS.forEach(c => { bycat[c.name] = { txs: [], total: 0, cat: c }; });
    txs.forEach(t => {
      if (!bycat[t.category]) bycat[t.category] = { txs: [], total: 0, cat: { name: t.category, icon: '📦', color: '#7f8c8d' } };
      bycat[t.category].txs.push(t);
      bycat[t.category].total += parseFloat(t.amount) || 0;
    });

    const activeCats = Object.values(bycat).filter(c => c.txs.length > 0);

    let html = `
      <div class="card">
        <div class="budget-summary">
          <div class="budget-stat">
            <div class="budget-stat-label">Total Spent</div>
            <div class="budget-stat-value red">$${total.toFixed(2)}</div>
          </div>
          <div class="budget-stat">
            <div class="budget-stat-label">Transactions</div>
            <div class="budget-stat-value">${txs.length}</div>
          </div>
        </div>
      </div>`;

    if (activeCats.length > 0) {
      html += '<div class="card">';
      activeCats.forEach(({ cat, txs: ctxs, total: ctotal }) => {
        const pct = total > 0 ? Math.min(100, (ctotal / total) * 100) : 0;
        html += `<div class="cat-row">
          <div class="cat-row-header">
            <div class="cat-name">${cat.icon} ${cat.name}</div>
            <div class="cat-amounts"><strong>$${ctotal.toFixed(2)}</strong> <span style="color:var(--text3)">(${pct.toFixed(0)}%)</span></div>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${cat.color}"></div></div>
        </div>`;
      });
      html += '</div>';
    }

    if (txs.length > 0) {
      html += '<div class="section-header"><h4>Recent Transactions</h4></div>';
      html += '<div class="card">';
      txs.slice(0, 20).forEach(t => {
        const cat = BUDGET_CATS.find(c => c.name === t.category) || { icon: '📦', color: '#7f8c8d' };
        const d = t.date.toDate ? t.date.toDate() : new Date(t.date);
        html += `<div class="tx-row">
          <div class="tx-icon" style="background:${cat.color}22;">${cat.icon}</div>
          <div class="tx-main">
            <div class="tx-desc">${t.description}</div>
            <div class="tx-meta"><span class="badge ${userClass(t.addedBy)}">${t.addedBy}</span> · ${d.toLocaleDateString('en-NZ',{day:'numeric',month:'short'})}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="tx-amount">$${parseFloat(t.amount).toFixed(2)}</div>
            <button class="delete-btn" onclick="deleteTx('${t.id}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>`;
      });
      html += '</div>';
    } else {
      html += `<div class="empty-state"><div class="icon">💰</div><p>No spending logged this month.<br>Tap + to add a transaction.</p></div>`;
    }

    el.innerHTML = html;
  };

  window.deleteTx = async (id) => {
    if (confirm('Delete this transaction?')) {
      await deleteDoc(doc(db, 'transactions', id));
      showToast('Deleted');
    }
  };

  window.showTransactionModal = () => {
    const today = new Date().toISOString().slice(0, 10);
    openModal(`
      <div class="modal-handle"></div>
      <h3>Add Transaction</h3>
      <div class="field"><label>DESCRIPTION</label><input id="tx-desc" placeholder="e.g. Supermarket run" autocomplete="off"/></div>
      <div class="field"><label>AMOUNT ($)</label><input id="tx-amt" type="number" placeholder="0.00" step="0.01" min="0"/></div>
      <div class="field"><label>CATEGORY</label>
        <select id="tx-cat">${BUDGET_CATS.map(c => `<option>${c.icon} ${c.name}</option>`).join('')}</select>
      </div>
      <div class="field"><label>DATE</label><input id="tx-date" type="date" value="${today}"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTransaction()">Add</button>
      </div>`);
    setTimeout(() => document.getElementById('tx-desc').focus(), 100);
  };

  window.saveTransaction = async () => {
    const desc = document.getElementById('tx-desc').value.trim();
    const amt = parseFloat(document.getElementById('tx-amt').value);
    const dateVal = document.getElementById('tx-date').value;
    const catRaw = document.getElementById('tx-cat').value;
    const category = catRaw.replace(/^[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]\s*/u, '');
    if (!desc) { showToast('Please enter a description'); return; }
    if (!amt || amt <= 0) { showToast('Please enter an amount'); return; }
    await addDoc(collection(db, 'transactions'), {
      description: desc, amount: amt,
      category: BUDGET_CATS.find(c => catRaw.includes(c.name))?.name || 'Other',
      date: new Date(dateVal + 'T12:00:00'),
      addedBy: currentUser, createdAt: new Date()
    });
    closeModalDirect();
    showToast(`$${amt.toFixed(2)} logged`);
  };

  // ── INIT ──
  document.getElementById('fab').style.display = 'none';
  if (currentUser) {
    selectUser(currentUser);
  }

</script>
</body>
</html>
